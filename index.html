<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->

    <meta name="theme-color" content="#161c2d" />

    <meta property="og:type"        content="website" />

    <meta property="og:description" content="A personal finance dashboard to track spending, categorize transactions, and stay on budget." />
    <meta property="og:image"       content="/android-chrome-512x512.png" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Finch — Your finances, in focus." />
    <meta name="twitter:description" content="A personal finance dashboard to track spending, categorize transactions, and stay on budget." />
    <meta name="twitter:image"       content="/android-chrome-512x512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
